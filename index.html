<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RTCTun</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Fira Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 20%, #f2f4ff, #f9fafc 55%, #f0f5ff 100%);
      }

      body {
        margin: 0;
        padding: 32px 20px 48px;
        display: flex;
        justify-content: center;
      }

      .panel {
        width: min(760px, 100%);
        background: #ffffffcc;
        backdrop-filter: blur(12px);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 16px 36px rgba(27, 48, 94, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        letter-spacing: 0.5px;
      }

      p {
        margin: 0 0 20px;
        color: #3d4c66;
      }

      label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
      }

      input, button {
        font: inherit;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #c8d3ea;
        width: 100%;
        box-sizing: border-box;
      }

      input {
        background: #f9fbff;
      }

      button {
        cursor: pointer;
        background: #1b4dff;
        color: white;
        border: none;
        margin-top: 12px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(27, 77, 255, 0.25);
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .status {
        margin-top: 16px;
        padding: 12px;
        background: #f1f5ff;
        border-radius: 10px;
        color: #1b2c4f;
        font-size: 14px;
      }

      .message-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        margin-top: 16px;
      }

      .log {
        margin-top: 16px;
        background: #0d1b33;
        color: #d7e2ff;
        padding: 14px;
        border-radius: 10px;
        font-family: "Fira Mono", "Consolas", monospace;
        min-height: 120px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>RTCTun</h1>
      <p>Establish a WebRTC data channel to the server and send text messages.</p>

      <div class="grid">
        <div>
          <label for="server">Server WebSocket URL</label>
          <input id="server" type="text" placeholder="ws://YOUR_SERVER_IP:8080" />
        </div>
        <div>
          <label for="stun">STUN server</label>
          <input id="stun" type="text" value="stun:stun3.l.google.com:5349" />
        </div>
      </div>

      <button id="connect">Connect</button>
      <div class="status" id="status">Idle.</div>

      <div class="message-row">
        <input id="message" type="text" placeholder="Send a message to the server" />
        <button id="send">Send</button>
      </div>

      <div class="log" id="log"></div>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const serverInput = document.getElementById("server");
      const stunInput = document.getElementById("stun");
      const messageInput = document.getElementById("message");
      const connectBtn = document.getElementById("connect");
      const sendBtn = document.getElementById("send");

      let ws;
      let pc;
      let channel;

      function log(message) {
        const line = `[${new Date().toLocaleTimeString()}] ${message}`;
        logEl.textContent = `${line}\n${logEl.textContent}`;
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function getServerUrl() {
        if (serverInput.value.trim()) {
          return serverInput.value.trim();
        }
        if (location.protocol.startsWith("http")) {
          const wsProto = location.protocol === "https:" ? "wss" : "ws";
          return `${wsProto}://${location.host}`;
        }
        return "ws://localhost:8080";
      }

      async function startConnection() {
        const url = getServerUrl();
        setStatus(`Connecting to ${url}...`);

        ws = new WebSocket(url);

        ws.onopen = async () => {
          setStatus("WebSocket connected. Creating peer connection...");

          pc = new RTCPeerConnection({
            iceServers: [{ urls: stunInput.value.trim() }],
          });

          pc.onicecandidate = (event) => {
            if (event.candidate) {
              ws.send(
                JSON.stringify({
                  type: "candidate",
                  candidate: event.candidate,
                })
              );
            }
          };

          pc.onconnectionstatechange = () => {
            setStatus(`Peer connection: ${pc.connectionState}`);
          };

          channel = pc.createDataChannel("rtctun");
          channel.onopen = () => log("Data channel open");
          channel.onclose = () => log("Data channel closed");
          channel.onmessage = (event) => log(`Server: ${event.data}`);

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          ws.send(
            JSON.stringify({
              type: "offer",
              sdp: pc.localDescription,
              iceServers: [{ urls: stunInput.value.trim() }],
            })
          );
        };

        ws.onmessage = async (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === "answer") {
            await pc.setRemoteDescription(msg.sdp);
            log("Received answer from server");
          } else if (msg.type === "candidate") {
            await pc.addIceCandidate(msg.candidate);
          }
        };

        ws.onclose = () => {
          setStatus("WebSocket closed");
        };

        ws.onerror = () => {
          setStatus("WebSocket error");
        };
      }

      connectBtn.addEventListener("click", () => {
        if (ws) {
          log("Already connected");
          return;
        }
        startConnection().catch((err) => {
          console.error(err);
          setStatus("Failed to start connection");
        });
      });

      sendBtn.addEventListener("click", () => {
        if (!channel || channel.readyState !== "open") {
          log("Data channel not open");
          return;
        }
        const text = messageInput.value.trim();
        if (!text) return;
        channel.send(text);
        log(`You: ${text}`);
        messageInput.value = "";
      });
    </script>
  </body>
</html>
